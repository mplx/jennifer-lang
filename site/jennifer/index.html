<!--
  go-import vanity page for the Jennifer module path.

  The Go module path is `jennifer-lang.dev/jennifer` (see go.mod), which is
  host-independent: `go get` fetches https://jennifer-lang.dev/jennifer?go-get=1
  and reads the go-import meta tag below to learn the real git host. The repo
  can move between GitHub orgs without ever touching go.mod again - only this
  page's go-import/go-source targets change.

  Served from the apex by the docs deploy: .github/workflows/docs.yml copies
  this file into book-output/jennifer/ after `mdbook build`, so the same Pages
  site hosts both the mdBook docs (at /) and this page (at /jennifer).
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="go-import" content="jennifer-lang.dev/jennifer git https://github.com/jennifer-language/jennifer">
<meta name="go-source" content="jennifer-lang.dev/jennifer https://github.com/jennifer-language/jennifer https://github.com/jennifer-language/jennifer/tree/main{/dir} https://github.com/jennifer-language/jennifer/blob/main{/dir}/{file}#L{line}">
<meta http-equiv="refresh" content="0; url=https://github.com/jennifer-language/jennifer">
<title>jennifer-lang.dev/jennifer</title>
</head>
<body>
Redirecting to <a href="https://github.com/jennifer-language/jennifer">github.com/jennifer-language/jennifer</a>.
</body>
</html>
