#
# mdBook configuration for the Jennifer documentation site. The
# canonical Markdown sources live in docs/; mdBook builds the static
# site into book-output/ (gitignored). The book ships via GitHub
# Pages on every push to main; see .github/workflows/docs.yml.

[book]
title = "Jennifer Programming Language"
description = "Small, experimental, interpreted programming language built on a TinyGo interpreter."
authors = ["developer@mplx.eu"]
language = "en"
src = "docs"

[build]
build-dir = "book-output"
create-missing = false

[output.html]
default-theme = "ayu"
preferred-dark-theme = "ayu"
# Widen the content column past mdBook's 750px default (see theme/custom.css).
additional-css = ["theme/custom.css"]
git-repository-url = "https://github.com/jennifer-language/jennifer"
edit-url-template = "https://github.com/jennifer-language/jennifer/edit/main/{path}"
# Land users on a single-file table of contents; the section index
# pages (libraries/index.md, technical/index.md, ...) still serve as
# the landing pages for their respective sections.
no-section-label = false

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true

[output.html.playground]
# Jennifer is not Rust; disable the Rust playground hooks mdBook
# enables by default, otherwise the (intended-for-Rust) "Run" button
# appears on `rust` fenced blocks and confuses readers.
runnable = false
