#
# PR gate: runs the full Go test suite and a TinyGo build on every
# push to main and every pull request. Linux amd64 only - the same
# pure-Go interpreter cross-compiles cleanly to arm64 and the other
# supported platforms, so per-arch test runs would not catch
# additional bugs at this stage. Cross-arch builds live in
# release.yml.

name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: go test + tinygo build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # The version codegen reads `git describe --tags --long`,
          # so a shallow checkout would produce a `dev` version
          # marker on PR runs. Full history is cheap on this repo.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up TinyGo
        uses: acifani/setup-tinygo@v3
        with:
          tinygo-version: '0.41.1'

      - name: Show toolchain versions
        run: |
          go version
          tinygo version

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt found unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Install JUnit reporter
        run: go install github.com/jstemmer/go-junit-report/v2@v2.1.0

      - name: go test (coverage + JUnit report)
        # Pipefail makes a test failure fail the step even though the output
        # is piped through the reporter: the leftmost `go test` sets the
        # pipeline status, go-junit-report writes report.xml before exiting,
        # and -set-exit-code is belt-and-braces. Readable log is teed aside.
        run: |
          set -o pipefail
          go test -v -covermode=atomic -coverprofile=cover.out ./... 2>&1 \
            | tee test-output.log \
            | "$(go env GOPATH)/bin/go-junit-report" -set-exit-code > report.xml

      - name: Coverage report (HTML + summary)
        if: always()
        run: |
          [ -f cover.out ] || exit 0
          go tool cover -func=cover.out | tee coverage-summary.txt
          go tool cover -html=cover.out -o coverage.html

      - name: Upload test and coverage reports
        # On success and failure, so a red build still yields the JUnit
        # report and whatever coverage was collected.
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            report.xml
            coverage.html
            coverage-summary.txt
            test-output.log
          if-no-files-found: warn

      - name: make build (both binaries)
        run: make build

      - name: Smoke-test the Go binary (default)
        run: ./jennifer run examples/hello.j

      - name: Smoke-test the TinyGo binary (constrained)
        run: ./jennifer-tiny run examples/hello.j

      - name: Lint the examples
        # Gate on the linter: any finding at or above the severity floor
        # (warning) fails the build. --format=github surfaces findings as
        # inline PR annotations. Lint is a default-binary-only dev feature,
        # so this uses ./jennifer (built by `make build` above).
        run: ./jennifer lint --format=github examples/*.j

      - name: Run the Jennifer test suite
        # Exercises the `testing` assertion vocabulary and the `jennifer
        # test` runner end to end on a .j suite. Non-zero exit (a failing
        # assertion, or a runner error) fails the build. TAP output is
        # readable in the CI log and consumable by TAP-aware reporters.
        run: ./jennifer test --format=tap examples/testsuite.j

      - name: Run the shipped module tests
        # Every module in modules/ ships a white-box `MODULE_test.j` overlay
        # (see modules/README.md); each must pass 100%. A failure fails the
        # build, so a broken module never reaches a release. All overlays run
        # (rc accumulates) so every failure shows, not just the first.
        run: |
          shopt -s nullglob
          rc=0
          tested=0
          for t in modules/*_test.j; do
            echo "== $t =="
            ./jennifer test "$t" || rc=1
            tested=$((tested + 1))
          done
          echo "ran $tested module test overlay(s)"
          exit $rc

      - name: Smoke-run the module example programs
        # The golden walker only covers top-level examples/*.j; the module /
        # include demos live in subdirs and aren't golden-checked. Smoke-run
        # each entry program (main.j / *_demo.j) so an API change that breaks
        # a demo fails the build. Only entry points run: module and included
        # files (config.j, db.j, greetinglib.j) are not standalone programs
        # (running one directly is a deliberate error), so the glob excludes
        # them, as it does the *_test.j overlays.
        run: |
          shopt -s nullglob
          rc=0
          ran=0
          for ex in examples/*/main.j examples/*/*_demo.j; do
            echo "== $ex =="
            ./jennifer run "$ex" || rc=1
            ran=$((ran + 1))
          done
          echo "smoke-ran $ran example program(s)"
          exit $rc

      - name: Run the benchmark suite (regression check)
        # Only on the main target, linux/amd64. This job runs on a single
        # ubuntu-latest (x64) runner today, so the guard is belt-and-braces:
        # it keeps the benchmark off any arm64 / macOS / Windows row a future
        # matrix might add, where the numbers would be noise anyway.
        if: ${{ runner.os == 'Linux' && runner.arch == 'X64' }}
        timeout-minutes: 30
        # Runs examples/benchmark.j on both binaries as a smoke / regression
        # signal: it catches a performance-path change that hangs or crashes.
        # The numbers themselves are NOT authoritative - a shared CI runner
        # is too noisy for that, and published figures come from the
        # reference machine - so nothing is captured; a non-zero exit (or a
        # timeout) is what fails the build.
        run: |
          ./jennifer run examples/benchmark.j
          ./jennifer-tiny run examples/benchmark.j

      - name: em-dash scan (project rule)
        run: |
          # No usage of U+2014 (em-dash) and U+2013 (en-dash)
          # anywhere in the repository. The pattern uses PCRE
          # byte-escape so this YAML itself stays clean - the
          # offending characters never appear in the source.
          if grep -rPn '\xe2\x80\x94|\xe2\x80\x93' \
              --include='*.md' --include='*.go' --include='*.j' \
              --include='*.yml' --include='*.yaml' --include='*.toml' \
              --include='*.sh' --include='*.bash' --include='*.1' \
              --include='PKGBUILD*' --include='Makefile' --include='*.sublime-syntax' \
              --exclude-dir=.git --exclude-dir=book-output \
              .; then
            echo "em-dash or en-dash found - use plain ASCII '-' instead"
            exit 1
          fi
