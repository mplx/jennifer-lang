#
# Build the mdBook documentation site from docs/ and publish to
# GitHub Pages on every push to main. The repository must have
# GitHub Pages enabled in Settings -> Pages with "GitHub Actions"
# as the source (a one-time manual step).

name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages-deploy requires `pages: write` and `id-token: write`.
# `contents: read` is the default but stated for clarity.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment may run at a time. Don't cancel an
# in-flight deploy mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build mdBook
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up mdBook
        env:
          # Pinned mdBook version. Bump in lockstep with the local
          # version used to verify book.toml's compatibility - 0.5.x
          # dropped a few 0.4.x-era fields (e.g. `multilingual`), so
          # straying across that boundary will surface as build
          # errors here.
          MDBOOK_VERSION: '0.5.3'
        run: |
          set -eu
          mkdir -p "$HOME/.local/bin"
          # Direct download from rust-lang/mdBook's release assets.
          # This pattern is the one documented in mdBook's own
          # deployment guide; it removes a third-party-action
          # dependency and gives us explicit URL control.
          url="https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          curl -sSL "$url" | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          # Sanity-check it's actually executable and the version
          # matches what we pinned.
          "$HOME/.local/bin/mdbook" --version

      - name: Build the book
        run: mdbook build

      - name: Render the PDF
        # Print the whole book (book-output/print.html) to a single PDF via
        # headless Chrome. GitHub's ubuntu-latest image ships Google Chrome
        # preinstalled, which scripts/gen-pdf.sh discovers. The PDF is written
        # into book-output/, so it deploys to the site alongside the HTML and
        # the introduction page links to it (jennifer-manual.pdf).
        run: sh scripts/gen-pdf.sh book-output/jennifer-manual.pdf

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: book-output

  deploy:
    name: Publish to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
