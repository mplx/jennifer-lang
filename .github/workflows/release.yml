# Copyright (C) 2026 <developer@mplx.eu>
#
# Tag-triggered release. Builds both binaries (`jennifer` via Go -
# the default, full-featured build - and `jennifer-tiny` via TinyGo -
# the constrained, embeddable variant) for every supported platform
# from a single amd64 runner via cross-compilation, runs a smoke
# test on each native-arch artifact via QEMU user-mode emulation
# when the runner can't execute the target arch directly, and
# publishes everything to GitHub Releases. Pre-1.0.0 tags publish as a
# pre-release; benchmarks run in the test pipeline (test.yml), not
# here - CI-runner numbers are too noisy for release notes.
#
# Supported platforms: linux/amd64, linux/arm64 (two binaries each).
# macOS and Windows ship best-effort, UNSUPPORTED `jennifer`-only
# builds in a separate matrix.

name: release

on:
  push:
    tags:
      # Bare-version tags like `0.14.1` (no `v` prefix). The glob is
      # `[0-9]*.[0-9]*.[0-9]*` so the first character of each segment
      # must be a digit; that filters out spurious dotted refs that
      # aren't versions.
      - '[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up TinyGo
        uses: acifani/setup-tinygo@v3
        with:
          tinygo-version: '0.41.1'

      - name: Set up QEMU (for non-native arch smoke tests)
        if: matrix.arch != 'amd64'
        uses: docker/setup-qemu-action@v4

      - name: Regenerate version stamp
        run: ./scripts/gen-version.sh

      - name: Build Go binary (jennifer)
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
        run: |
          # Release flags: -trimpath drops local build paths for a
          # reproducible binary; -ldflags "-s -w" strips DWARF and the
          # symbol table (~30% smaller). Go keeps its own pclntab, so
          # panic stack traces stay symbolized, and the version comes
          # from the codegen stamp above (not -ldflags -X), so stripping
          # is safe. Dev builds (make build) keep symbols for debugging.
          go build -trimpath -ldflags="-s -w" -o jennifer ./cmd/jennifer

      - name: Build TinyGo binary (jennifer-tiny)
        env:
          # TinyGo's `-target=` flag names board / arch presets
          # (`wasi`, `microbit`, ...); it does *not* accept `os/arch`
          # pairs like `linux/amd64`. For plain OS/arch cross-compile
          # TinyGo reads GOOS/GOARCH like the standard toolchain does.
          # Flags mirror the Makefile so release and dev builds match:
          # `-scheduler=tasks` pins the cooperative single-thread
          # scheduler (the threads-capable default segfaults on recursive
          # `spawn` bodies, since -stack-size doesn't govern OS-thread
          # stacks); `-stack-size=2mb` covers the deep Go-stack frames
          # Jennifer's tree-walking evaluator wraps each call in (TinyGo's
          # ~8KB default overflows, and 1MB sat right at the edge - the
          # serial recursive fib in examples/benchmark.j overflowed nested
          # one call frame deep). `-no-debug` strips DWARF for a smaller
          # release binary. Keep this in sync with the Makefile. See
          # docs/technical/tinygo.md.
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          tinygo build -scheduler=tasks -stack-size=2mb -no-debug -o jennifer-tiny ./cmd/jennifer

      - name: Smoke-test the binaries
        run: |
          # On a native-arch run we execute directly; on a foreign
          # arch QEMU user-mode emulation handles it.
          ./jennifer run examples/hello.j
          ./jennifer-tiny run examples/hello.j

      - name: Package artifacts
        run: |
          mkdir -p dist
          # One archive per (platform, arch) carrying both binaries
          # plus the packaging metadata downstream distros consume.
          # Naming: jennifer-${TAG}-${OS}-${ARCH}.tar.gz
          TAG="${GITHUB_REF_NAME}"
          STAGE="jennifer-${TAG}-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir -p "$STAGE/share/man/man1" "$STAGE/share/mime/packages" \
                   "$STAGE/share/bash-completion/completions" \
                   "$STAGE/share/vim/vimfiles/syntax" "$STAGE/share/vim/vimfiles/ftdetect" \
                   "$STAGE/share/nvim/site/syntax" "$STAGE/share/nvim/site/ftdetect"
          cp jennifer jennifer-tiny "$STAGE/"
          cp packaging/man/jennifer.1      "$STAGE/share/man/man1/"
          cp packaging/man/jennifer-tiny.1 "$STAGE/share/man/man1/"
          cp packaging/mime/jennifer.xml "$STAGE/share/mime/packages/"
          cp packaging/completions/jennifer.bash "$STAGE/share/bash-completion/completions/jennifer"
          ln -sf jennifer "$STAGE/share/bash-completion/completions/jennifer-tiny"
          # Vim and Neovim read separate runtimepaths; ship a copy for each.
          cp editors/vim/syntax/jennifer.vim   "$STAGE/share/vim/vimfiles/syntax/"
          cp editors/vim/ftdetect/jennifer.vim "$STAGE/share/vim/vimfiles/ftdetect/"
          cp editors/vim/syntax/jennifer.vim   "$STAGE/share/nvim/site/syntax/"
          cp editors/vim/ftdetect/jennifer.vim "$STAGE/share/nvim/site/ftdetect/"
          cp README.md "$STAGE/" 2>/dev/null || true
          cp JENNIFER.md "$STAGE/" 2>/dev/null || true
          tar -czf "dist/${STAGE}.tar.gz" "$STAGE"
          (cd dist && sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256")

      - name: Build Debian .deb
        run: |
          mkdir -p dist
          # Tags are bare semver (e.g. `0.14.1`), no `v` prefix to strip.
          DEB_VERSION="${GITHUB_REF_NAME}"
          case "${{ matrix.arch }}" in
              amd64)  DEB_ARCH=amd64 ;;
              arm64)  DEB_ARCH=arm64 ;;
              *)      echo "unsupported arch ${{ matrix.arch }}" >&2; exit 1 ;;
          esac
          ./scripts/build-deb.sh "$DEB_VERSION" "$DEB_ARCH" dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: jennifer-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.sha256
          retention-days: 7

  # Best-effort, UNSUPPORTED macOS + Windows builds. Standard `jennifer`
  # only - TinyGo's macOS/Windows host support is too limited to ship, so
  # no `jennifer-tiny` off Linux. `continue-on-error` + `fail-fast: false`
  # mean a broken target never fails the run or blocks the Linux release;
  # the `release` job runs as long as the supported `build` job succeeded.
  build-unsupported:
    name: Build (unsupported) ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
          - os: windows
            arch: '386'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Regenerate version stamp
        run: ./scripts/gen-version.sh

      - name: Build Go binary (jennifer only)
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
        run: |
          ext=""
          [ "${{ matrix.os }}" = "windows" ] && ext=".exe"
          go build -trimpath -ldflags="-s -w" -o "jennifer${ext}" ./cmd/jennifer

      - name: Package (unsupported)
        run: |
          mkdir -p dist
          TAG="${GITHUB_REF_NAME}"
          STAGE="jennifer-${TAG}-${{ matrix.os }}-${{ matrix.arch }}-UNSUPPORTED"
          mkdir -p "$STAGE"
          ext=""
          [ "${{ matrix.os }}" = "windows" ] && ext=".exe"
          cp "jennifer${ext}" "$STAGE/"
          cp README.md JENNIFER.md packaging/UNSUPPORTED.txt "$STAGE/"
          cp packaging/debian/copyright "$STAGE/LICENSE.txt"
          if [ "${{ matrix.os }}" = "windows" ]; then
            zip -qr "dist/${STAGE}.zip" "$STAGE"
            (cd dist && sha256sum "${STAGE}.zip" > "${STAGE}.zip.sha256")
          else
            tar -czf "dist/${STAGE}.tar.gz" "$STAGE"
            (cd dist && sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256")
          fi

      - name: Upload build artifacts (unsupported)
        uses: actions/upload-artifact@v7
        with:
          name: jennifer-unsupported-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            dist/*.zip
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: ignore
          retention-days: 7

  release:
    name: Publish GitHub Release
    # Wait for both build jobs, but publish as long as the SUPPORTED Linux
    # build passed; the unsupported job's outcome (pass / fail / partial)
    # never gates the release.
    needs: [build, build-unsupported]
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Assemble release directory
        run: |
          mkdir -p release
          find artifacts -type f \
              \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.deb' -o -name '*.sha256' \) \
              -exec cp {} release/ \;
          ls -la release/

      - name: Generate release-ready PKGBUILD-bin
        run: |
          # Take the committed packaging/arch/PKGBUILD-bin template
          # and substitute the real pkgver + sha256sums so the AUR
          # maintainer can publish without hand-editing. The output
          # is attached to the GitHub Release; the in-tree template
          # stays as the canonical source.
          # Tags are bare semver, so PKGVER == tag.
          PKGVER="${GITHUB_REF_NAME}"
          # Pull the per-arch tarball hashes out of the sidecar
          # .sha256 files (format: "HASH  FILENAME").
          AMD64_TAR="jennifer-${PKGVER}-linux-amd64.tar.gz"
          ARM64_TAR="jennifer-${PKGVER}-linux-arm64.tar.gz"
          AMD64_HASH=$(awk '{print $1}' "release/${AMD64_TAR}.sha256")
          ARM64_HASH=$(awk '{print $1}' "release/${ARM64_TAR}.sha256")
          sed \
              -e "s/^pkgver=.*/pkgver=${PKGVER}/" \
              -e "s|^sha256sums_x86_64=.*|sha256sums_x86_64=('${AMD64_HASH}')|" \
              -e "s|^sha256sums_aarch64=.*|sha256sums_aarch64=('${ARM64_HASH}')|" \
              packaging/arch/PKGBUILD-bin > release/PKGBUILD-bin
          echo "--- generated PKGBUILD-bin ---"
          cat release/PKGBUILD-bin

      - name: Generate release-ready PKGBUILD-git
        run: |
          # The -git package builds from the main branch and computes its
          # own pkgver via the pkgver() function at makepkg time, so there
          # is no tarball hash to substitute (git sources are 'SKIP'). We
          # still attach it to the Release for parity with PKGBUILD-bin and
          # so the AUR maintainer has both in one place; the only edit is to
          # seed the pkgver placeholder with the released tag as the base
          # (pkgver() overrides it on an actual build).
          PKGVER="${GITHUB_REF_NAME}"
          sed \
              -e "s/^pkgver=.*/pkgver=${PKGVER}.r0.g0000000/" \
              packaging/arch/PKGBUILD-git > release/PKGBUILD-git
          echo "--- generated PKGBUILD-git ---"
          cat release/PKGBUILD-git

      - name: Compose release notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          {
            echo "## Jennifer ${TAG}"
            echo
            echo "**Linux** ships two binaries - same source, same language, different compiler:"
            echo
            echo "- \`jennifer\`       - standard Go build. Default, full-featured; what most users want."
            echo "- \`jennifer-tiny\`  - TinyGo build. Smaller, embeddable; no \`os/exec\` or network stack."
            echo
            echo "**macOS and Windows** get the standard \`jennifer\` only, as best-effort *unsupported* builds (no \`jennifer-tiny\`)."
            echo
            echo "Install \`jennifer\` unless you have a specific reason to use the constrained variant; see \`docs/user-guide/installing.md\` for guidance."
            echo
            echo "### Artifacts"
            echo
            for f in release/*.tar.gz release/*.zip; do
              [ -e "$f" ] || continue
              echo "- \`$(basename "$f")\`"
            done
            echo
            echo "Artifacts named \`-UNSUPPORTED\` are best-effort macOS / Windows"
            echo "builds (standard \`jennifer\` only, no TinyGo, unsigned, no support);"
            echo "see \`docs/user-guide/installing.md\`. They may be missing if that"
            echo "build failed - it does not block the Linux release."
          } > release_notes.md
          cat release_notes.md

      - name: Determine pre-release status
        id: prerel
        run: |
          # Everything in the 0.x.y series is a pre-release; 1.0.0 and later
          # publish as full releases. Tags are bare semver, so the major
          # version is the leading segment.
          case "${GITHUB_REF_NAME}" in
            0.*) echo "prerelease=true"  >> "$GITHUB_OUTPUT" ;;
            *)   echo "prerelease=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          # Published (not a draft) so anonymous users see it. Pre-1.0.0
          # tags are flagged as pre-releases until the first stable release.
          draft: false
          prerelease: ${{ steps.prerel.outputs.prerelease }}
          generate_release_notes: false
          body_path: release_notes.md
          files: |
            release/*.tar.gz
            release/*.zip
            release/*.deb
            release/*.sha256
            release/PKGBUILD-bin
            release/PKGBUILD-git
