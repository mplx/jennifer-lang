#
# Build and push the Jennifer container images to GHCR on a version tag.
# Two multi-arch variants from packaging/docker/Dockerfile:
#   slim   -> ghcr.io/<owner>/jennifer:<ver>, :<major>.<minor>, :latest
#   static -> ghcr.io/<owner>/jennifer:<ver>-static, :static
# Both linux/amd64 + linux/arm64. Cross-compiled on the amd64 runner (Go and
# TinyGo honour GOARCH), so only the slim stage's tiny apt step touches QEMU.
# Independent of release.yml - the image build is self-contained from source.

name: docker

on:
  push:
    tags:
      # Same bare-version glob as release.yml (e.g. `0.21.0`, no `v` prefix).
      - '[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/jennifer

jobs:
  images:
    name: Build and push images (GHCR)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---- slim (default / :latest) ----
      - name: Metadata (slim)
        id: meta-slim
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push (slim)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packaging/docker/Dockerfile
          target: slim
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta-slim.outputs.tags }}
          labels: ${{ steps.meta-slim.outputs.labels }}
          cache-from: type=gha,scope=slim
          cache-to: type=gha,scope=slim,mode=max

      # ---- static (distroless / :static) ----
      - name: Metadata (static)
        id: meta-static
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}},suffix=-static
            type=raw,value=static,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push (static)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packaging/docker/Dockerfile
          target: static
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta-static.outputs.tags }}
          labels: ${{ steps.meta-static.outputs.labels }}
          cache-from: type=gha,scope=static
          cache-to: type=gha,scope=static,mode=max
